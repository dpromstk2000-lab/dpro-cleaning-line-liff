<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#087f8c">
  <meta name="color-scheme" content="light">
  <title>DPRO クリーニング LINE｜店舗タブレット受け渡し</title>
  <style>
    :root {
      --bg:#edf5f7;
      --panel:#fff;
      --line:#d4e3e8;
      --ink:#163644;
      --muted:#687f89;
      --primary:#07828e;
      --primary-dark:#05616a;
      --success:#16825d;
      --warning:#b16d00;
      --danger:#bd3b49;
      --purple:#6949ad;
      --shadow:0 12px 32px rgba(23,55,69,.09);
      --radius:18px;
    }

    * { box-sizing:border-box; }

    [hidden] {
      display:none !important;
    }

    body {
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:
        -apple-system,BlinkMacSystemFont,"Segoe UI",
        "Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    }

    button,input,select,textarea { font:inherit; }
    button { cursor:pointer; }
    button:disabled { opacity:.55; cursor:not-allowed; }

    .header {
      padding:20px 18px;
      color:#fff;
      background:linear-gradient(135deg,#05636d,#07828e 58%,#0ca7a9);
    }

    .header-inner {
      width:min(1480px,100%);
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-mark {
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:15px;
      background:rgba(255,255,255,.17);
      font-size:25px;
    }

    h1 { margin:0; font-size:clamp(22px,3vw,34px); }
    .subtitle { margin-top:4px; color:rgba(255,255,255,.82); font-size:12px; }
    .version {
      padding:7px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      font-size:10px;
    }

    .container {
      width:min(1480px,calc(100% - 22px));
      margin:16px auto 44px;
    }

    .panel {
      margin-bottom:14px;
      padding:15px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .connection-grid {
      display:grid;
      grid-template-columns:
        minmax(160px,.65fr)
        auto
        minmax(190px,.7fr)
        minmax(250px,1fr)
        auto;
      gap:9px;
      align-items:end;
    }

    label {
      display:block;
      margin-bottom:6px;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }

    input,select,textarea {
      width:100%;
      border:1px solid #c6d8df;
      border-radius:11px;
      padding:9px 12px;
      color:var(--ink);
      background:#fff;
      outline:none;
    }

    input,select { min-height:48px; }
    textarea { min-height:84px; resize:vertical; }

    input:focus,select:focus,textarea:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(7,130,142,.12);
    }

    .button {
      min-height:48px;
      border:0;
      border-radius:11px;
      padding:9px 15px;
      font-weight:900;
    }

    .button-primary { color:#fff; background:var(--primary); }
    .button-secondary { color:var(--primary-dark); background:#e7f5f6; }
    .button-danger { color:var(--danger); background:#fff0f2; border:1px solid #edc5ca; }
    .button-success { color:#fff; background:var(--success); }
    .clear-button { color:var(--danger); background:#fff; border:1px solid #d5e0e5; }

    .status-line {
      margin-top:9px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:11px;
      color:var(--muted);
      background:#f9fbfc;
      font-size:12px;
      line-height:1.6;
    }

    .status-line.success {
      color:#126847;
      border-color:#bfe2d3;
      background:#ebf9f3;
    }

    .status-line.error {
      color:#982e3b;
      border-color:#edc5ca;
      background:#fff0f2;
    }

    .toolbar {
      display:grid;
      grid-template-columns:1fr 180px auto auto;
      gap:9px;
      align-items:end;
    }

    .summary-grid {
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:9px;
    }

    .summary-card {
      padding:13px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fbfdfe;
    }

    .summary-label {
      color:var(--muted);
      font-size:10px;
      font-weight:900;
    }

    .summary-value {
      margin-top:4px;
      font-size:28px;
      font-weight:900;
    }

    .workspace {
      display:grid;
      grid-template-columns:minmax(440px,.95fr) minmax(500px,1.15fr);
      gap:14px;
      align-items:start;
    }

    .list-panel,
    .detail-panel {
      min-width:0;
    }

    .section-title {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:11px;
    }

    .section-title h2 {
      margin:0;
      font-size:18px;
    }

    .section-note {
      color:var(--muted);
      font-size:10px;
    }

    .order-list {
      display:grid;
      gap:9px;
      max-height:calc(100vh - 335px);
      overflow:auto;
      padding-right:3px;
    }

    .order-card {
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:13px;
      color:var(--ink);
      background:#fff;
      text-align:left;
      transition:.15s ease;
    }

    .order-card:hover {
      border-color:#9dcfd3;
      transform:translateY(-1px);
    }

    .order-card.selected {
      border:2px solid var(--primary);
      background:#f1fbfb;
      box-shadow:0 8px 18px rgba(7,130,142,.12);
    }

    .order-top {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .order-number {
      font-size:15px;
      font-weight:900;
    }

    .customer-name {
      margin-top:4px;
      font-size:14px;
      font-weight:900;
    }

    .meta {
      margin-top:4px;
      color:var(--muted);
      font-size:10px;
      line-height:1.6;
    }

    .badges {
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:5px;
    }

    .badge {
      padding:5px 8px;
      border-radius:999px;
      font-size:9px;
      font-weight:900;
    }

    .badge-ready { color:#08764f; background:#e6f7ef; }
    .badge-stored { color:#6541a2; background:#f1eafb; }
    .badge-long { color:#fff; background:var(--purple); }
    .badge-payment { color:#945700; background:#fff2d8; }
    .badge-paid { color:#08764f; background:#e6f7ef; }

    .order-bottom {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:7px;
      margin-top:10px;
    }

    .mini {
      padding:8px;
      border:1px solid #dce8ec;
      border-radius:10px;
      background:#f9fbfc;
    }

    .mini-label {
      color:var(--muted);
      font-size:8px;
      font-weight:900;
    }

    .mini-value {
      margin-top:2px;
      font-size:12px;
      font-weight:900;
    }

    .empty {
      padding:30px 12px;
      border:1px dashed #c7d8de;
      border-radius:14px;
      color:var(--muted);
      background:#fbfdfe;
      text-align:center;
      font-size:12px;
    }

    .detail-placeholder {
      min-height:480px;
      display:grid;
      place-items:center;
      border:1px dashed #c7d8de;
      border-radius:14px;
      color:var(--muted);
      background:#fbfdfe;
      text-align:center;
      padding:20px;
    }

    .detail-header {
      padding:14px;
      border:1px solid #bcdadd;
      border-radius:14px;
      background:linear-gradient(135deg,#f2fbfb,#fff);
    }

    .detail-header-top {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .detail-order-number {
      font-size:22px;
      font-weight:900;
    }

    .detail-customer {
      margin-top:5px;
      font-size:18px;
      font-weight:900;
    }

    .detail-summary {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-top:12px;
    }

    .items {
      display:grid;
      gap:8px;
      margin-top:13px;
    }

    .item-row {
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:10px;
      align-items:center;
      padding:11px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }

    .item-code {
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border-radius:10px;
      color:var(--primary-dark);
      background:#e7f5f6;
      font-size:10px;
      font-weight:900;
    }

    .item-name {
      font-size:13px;
      font-weight:900;
    }

    .item-options {
      margin-top:3px;
      color:var(--muted);
      font-size:9px;
    }

    .payment-box {
      margin-top:13px;
      padding:13px;
      border:1px solid #c5dce0;
      border-radius:14px;
      background:#f7fbfc;
    }

    .payment-title {
      margin:0 0 10px;
      font-size:16px;
    }

    .payment-options {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .payment-option {
      min-height:54px;
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px;
      border:1px solid #cbdde2;
      border-radius:11px;
      background:#fff;
      font-size:11px;
      font-weight:900;
    }

    .payment-option input {
      width:20px;
      min-height:auto;
      margin:0;
    }

    .confirm-box {
      margin-top:12px;
      padding:12px;
      border:1px solid #bfe2d3;
      border-radius:13px;
      background:#effaf5;
    }

    .confirm-label {
      display:flex;
      align-items:flex-start;
      gap:9px;
      margin:0;
      color:#126847;
      font-size:12px;
      line-height:1.5;
    }

    .confirm-label input {
      width:22px;
      min-height:auto;
      margin:1px 0 0;
    }

    .complete-button {
      width:100%;
      min-height:62px;
      margin-top:12px;
      font-size:18px;
    }

    .success-card {
      padding:20px;
      border:2px solid #62c49d;
      border-radius:15px;
      color:#126847;
      background:#eaf9f2;
      text-align:center;
    }

    .success-icon {
      font-size:44px;
    }

    .success-title {
      margin-top:8px;
      font-size:24px;
      font-weight:900;
    }

    .success-order {
      margin-top:5px;
      font-size:18px;
      font-weight:900;
    }

    .toast {
      position:fixed;
      z-index:1000;
      left:50%;
      bottom:24px;
      width:min(560px,calc(100% - 28px));
      transform:translate(-50%,30px);
      opacity:0;
      pointer-events:none;
      border-radius:13px;
      padding:14px 16px;
      color:#fff;
      background:#173543;
      box-shadow:0 12px 34px rgba(0,0,0,.2);
      transition:.22s ease;
      font-size:13px;
      font-weight:900;
      text-align:center;
    }

    .toast.visible {
      transform:translate(-50%,0);
      opacity:1;
    }

    .toast.error {
      background:#a93240;
    }

    @media (max-width:1050px) {
      .connection-grid {
        grid-template-columns:1fr auto 1fr;
      }

      .connection-grid .staff-field {
        grid-column:1 / 3;
      }

      .workspace {
        grid-template-columns:1fr;
      }

      .order-list {
        max-height:520px;
      }
    }

    @media (max-width:760px) {
      .version { display:none; }
      .connection-grid,
      .toolbar,
      .summary-grid,
      .detail-summary,
      .payment-options {
        grid-template-columns:1fr;
      }

      .connection-grid .staff-field {
        grid-column:auto;
      }

      .order-bottom {
        grid-template-columns:1fr 1fr;
      }
    }
  
    /* STEP CLEANING-17-R2 共通内部ナビ */

    .final-nav a.active {
      border-color: #07828e;

      .final-nav {
        width: 100%;

    @media print {
      .final-nav-shell { display: none !important; }
    }

  </style>
</head>

  <script>
    "use strict";

    const PAGE_VERSION =
      "CLEANING-17-R2-SYSTEM-CHECK-SALES-DEMO-CASES-20260713";

    const API_BASE =
      "https://dpro-cleaning-line-api.dpromstk2000.workers.dev";

    const PAYMENT_STATUS_LABELS = {
      unpaid: "未払い",
      paid: "支払い済み",
      pay_on_pickup: "受取時に支払い",
      refunded: "返金済み"
    };

    const PAYMENT_METHOD_LABELS = {
      cash: "現金",
      card: "カード",
      qr: "QR・コード決済",
      bank_transfer: "銀行振込",
      other: "その他"
    };

    const elements = {
      adminKey: document.getElementById("adminKey"),
      clearAdminKeyButton:
        document.getElementById("clearAdminKeyButton"),
      shopCode: document.getElementById("shopCode"),
      staffSelect: document.getElementById("staffSelect"),
      openButton: document.getElementById("openButton"),
      connectionStatus:
        document.getElementById("connectionStatus"),
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      searchButton: document.getElementById("searchButton"),
      refreshButton: document.getElementById("refreshButton"),
      summaryTotal: document.getElementById("summaryTotal"),
      summaryReady: document.getElementById("summaryReady"),
      summaryStored: document.getElementById("summaryStored"),
      summaryLong: document.getElementById("summaryLong"),
      summaryPayment: document.getElementById("summaryPayment"),
      filteredCount: document.getElementById("filteredCount"),
      orderList: document.getElementById("orderList"),
      detailPlaceholder:
        document.getElementById("detailPlaceholder"),
      detailContent: document.getElementById("detailContent"),
      toast: document.getElementById("toast")
    };

    const state = {
      board: null,
      selectedOrderId: null,
      busy: false
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatYen(value) {
      return `${Number(value || 0).toLocaleString("ja-JP")}円`;
    }

    function formatDateJa(value) {
      const match = String(value || "").match(
        /^(\d{4})-(\d{2})-(\d{2})/
      );

      if (!match) return "-";

      return `${Number(match[1])}年${Number(match[2])}月${Number(match[3])}日`;
    }

    function maskPhone(value) {
      const phone = String(value || "");

      if (phone.length < 7) return phone || "-";

      return `${phone.slice(0,3)}-****-${phone.slice(-4)}`;
    }

    function buildAdminUrl(path) {
      const url = new URL(`${API_BASE}${path}`);

      url.searchParams.set(
        "admin_key",
        elements.adminKey.value.trim()
      );

      url.searchParams.set(
        "shop_code",
        elements.shopCode.value.trim() ||
          "cleaning_demo"
      );

      return url;
    }

    async function apiFetch(url, options = {}) {
      const response = await fetch(url, options);
      const contentType =
        response.headers.get("content-type") || "";

      if (!contentType.includes("application/json")) {
        throw new Error(
          `APIからJSON以外の応答が返りました（HTTP ${response.status}）`
        );
      }

      const data = await response.json();

      if (!response.ok || data.ok === false) {
        const error = new Error(
          data.message || "API処理に失敗しました。"
        );
        error.data = data;
        error.status = response.status;
        throw error;
      }

      return data;
    }

    async function loadBoard(options = {}) {
      if (state.busy && options.force !== true) return;

      if (!elements.adminKey.value.trim()) {
        setStatus(
          "管理コードを入力してください。",
          "error"
        );
        return;
      }

      state.busy = true;
      setBusy(true);
      setStatus("受取待ち一覧を読み込んでいます。");

      try {
        const url = buildAdminUrl(
          "/api/admin/pickup-board"
        );

        const q = elements.searchInput.value.trim();

        if (q) {
          url.searchParams.set("q", q);
        }

        url.searchParams.set(
          "status",
          elements.statusFilter.value
        );

        const data = await apiFetch(url);
        state.board = data.board;

        renderStaff(data.board.staff || []);
        renderSummary(data.board.summary || {});
        renderOrders(data.board.orders || []);

        if (
          state.selectedOrderId &&
          !(data.board.orders || []).some(
            (order) =>
              order.order_id === state.selectedOrderId
          )
        ) {
          clearDetail();
        }

        setStatus(
          `${data.board.shop?.shop_name || "店舗"}の受取待ちを更新しました。`,
          "success"
        );

        if (options.keepSelection && state.selectedOrderId) {
          selectOrder(state.selectedOrderId);
        }
      } catch (error) {
        console.error(error);
        setStatus(
          error.data?.message || error.message,
          "error"
        );
      } finally {
        state.busy = false;
        setBusy(false);
      }
    }

    function renderStaff(staff) {
      const currentValue = elements.staffSelect.value;

      elements.staffSelect.innerHTML =
        '<option value="">担当スタッフを選択</option>';

      for (const member of staff) {
        const option = document.createElement("option");
        option.value = member.id;
        option.textContent =
          `${member.display_name}（${roleLabel(member.role)}）`;
        elements.staffSelect.appendChild(option);
      }

      if (
        currentValue &&
        staff.some((member) => member.id === currentValue)
      ) {
        elements.staffSelect.value = currentValue;
      } else if (staff.length === 1) {
        elements.staffSelect.value = staff[0].id;
      }
    }

    function roleLabel(role) {
      return {
        owner: "オーナー",
        manager: "管理者",
        reception: "受付",
        factory: "作業",
        delivery: "集配"
      }[role] || role || "スタッフ";
    }

    function renderSummary(summary) {
      elements.summaryTotal.textContent =
        Number(summary.total || 0);
      elements.summaryReady.textContent =
        Number(summary.ready || 0);
      elements.summaryStored.textContent =
        Number(summary.stored || 0);
      elements.summaryLong.textContent =
        Number(summary.long_storage || 0);
      elements.summaryPayment.textContent =
        Number(summary.payment_required || 0);
    }

    function renderOrders(orders) {
      elements.orderList.innerHTML = "";
      elements.filteredCount.textContent =
        `${orders.length}件`;

      if (!orders.length) {
        elements.orderList.innerHTML =
          '<div class="empty">該当する受取待ちはありません。</div>';
        return;
      }

      for (const order of orders) {
        const customer = order.customer || {};
        const button = document.createElement("button");

        button.type = "button";
        button.className =
          `order-card${
            state.selectedOrderId === order.order_id
              ? " selected"
              : ""
          }`;

        const statusBadge =
          order.status === "stored"
            ? '<span class="badge badge-stored">保管中</span>'
            : '<span class="badge badge-ready">仕上がり済み</span>';

        const longBadge =
          order.is_long_storage
            ? '<span class="badge badge-long">長期保管</span>'
            : "";

        const paymentBadge =
          order.payment_status === "paid"
            ? '<span class="badge badge-paid">支払い済み</span>'
            : `<span class="badge badge-payment">${
                escapeHtml(
                  PAYMENT_STATUS_LABELS[
                    order.payment_status
                  ] || order.payment_status
                )
              }</span>`;

        button.innerHTML = `
          <div class="order-top">
            <div>
              <div class="order-number">
                ${escapeHtml(order.order_number)}
              </div>
              <div class="customer-name">
                ${escapeHtml(customer.full_name)}
              </div>
              <div class="meta">
                ${escapeHtml(customer.customer_number)}
                ／ ${escapeHtml(maskPhone(customer.phone_normalized))}
              </div>
            </div>
            <div class="badges">
              ${statusBadge}
              ${longBadge}
              ${paymentBadge}
            </div>
          </div>

          <div class="order-bottom">
            <div class="mini">
              <div class="mini-label">仕上がり予定</div>
              <div class="mini-value">
                ${escapeHtml(formatDateJa(order.promised_date))}
              </div>
            </div>
            <div class="mini">
              <div class="mini-label">品物</div>
              <div class="mini-value">
                ${Number(order.item_count || 0)}点
              </div>
            </div>
            <div class="mini">
              <div class="mini-label">合計</div>
              <div class="mini-value">
                ${escapeHtml(formatYen(order.total_amount))}
              </div>
            </div>
          </div>
        `;

        button.addEventListener("click", () => {
          state.selectedOrderId = order.order_id;
          renderOrders(state.board.orders || []);
          renderDetail(order);
        });

        elements.orderList.appendChild(button);
      }
    }

    function selectOrder(orderId) {
      const order = (state.board?.orders || []).find(
        (item) => item.order_id === orderId
      );

      if (!order) {
        clearDetail();
        return;
      }

      state.selectedOrderId = orderId;
      renderOrders(state.board.orders || []);
      renderDetail(order);
    }

    function renderDetail(order) {
      const customer = order.customer || {};
      const items = Array.isArray(order.items)
        ? order.items
        : [];

      elements.detailPlaceholder.hidden = true;
      elements.detailContent.hidden = false;

      const paymentRequired =
        order.payment_status !== "paid";

      const itemHtml = items.map((item) => {
        const options = Array.isArray(item.options)
          ? item.options
          : [];

        const optionText = options.length
          ? options
              .map((option) =>
                `${option.option_name}×${Number(option.quantity || 0)}`
              )
              .join("、")
          : "加工なし";

        return `
          <div class="item-row">
            <div class="item-code">
              ${escapeHtml(item.item_code)}
            </div>
            <div>
              <div class="item-name">
                ${escapeHtml(item.item_name)}
                × ${Number(item.quantity || 0)}
              </div>
              <div class="item-options">
                ${escapeHtml(optionText)}
              </div>
            </div>
            <strong>
              ${escapeHtml(formatYen(item.line_amount))}
            </strong>
          </div>
        `;
      }).join("");

      const paymentHtml = paymentRequired
        ? `
          <div class="payment-box">
            <h3 class="payment-title">
              支払い確認
            </h3>

            <div class="payment-options">
              ${paymentRadio("cash", "現金")}
              ${paymentRadio("card", "カード")}
              ${paymentRadio("qr", "QR・コード決済")}
              ${paymentRadio("bank_transfer", "銀行振込")}
              ${paymentRadio("other", "その他")}

              <label class="payment-option">
                <input
                  type="radio"
                  name="paymentChoice"
                  value="leave_unpaid"
                >
                未精算のまま受け渡す
              </label>
            </div>

            <div class="meta">
              「未精算のまま受け渡す」を選ぶと、
              オーナー画面の未精算対象に残ります。
            </div>
          </div>
        `
        : `
          <div class="payment-box">
            <h3 class="payment-title">
              支払い確認
            </h3>
            <div class="status-line success">
              この注文は支払い済みです。
              追加の支払い操作はありません。
            </div>
          </div>
        `;

      elements.detailContent.innerHTML = `
        <div class="detail-header">
          <div class="detail-header-top">
            <div>
              <div class="detail-order-number">
                ${escapeHtml(order.order_number)}
              </div>
              <div class="detail-customer">
                ${escapeHtml(customer.full_name)} 様
              </div>
              <div class="meta">
                会員番号：${escapeHtml(customer.customer_number)}
                ／ 電話：${escapeHtml(maskPhone(customer.phone_normalized))}
              </div>
            </div>

            <div class="badges">
              ${
                order.status === "stored"
                  ? '<span class="badge badge-stored">保管中</span>'
                  : '<span class="badge badge-ready">仕上がり済み</span>'
              }
              ${
                order.is_long_storage
                  ? '<span class="badge badge-long">長期保管</span>'
                  : ""
              }
            </div>
          </div>

          <div class="detail-summary">
            <div class="mini">
              <div class="mini-label">品物点数</div>
              <div class="mini-value">
                ${Number(order.item_count || 0)}点
              </div>
            </div>
            <div class="mini">
              <div class="mini-label">合計金額</div>
              <div class="mini-value">
                ${escapeHtml(formatYen(order.total_amount))}
              </div>
            </div>
            <div class="mini">
              <div class="mini-label">支払い</div>
              <div class="mini-value">
                ${escapeHtml(
                  PAYMENT_STATUS_LABELS[
                    order.payment_status
                  ] || order.payment_status
                )}
              </div>
            </div>
            <div class="mini">
              <div class="mini-label">保管日数</div>
              <div class="mini-value">
                ${Number(order.days_waiting || 0)}日
              </div>
            </div>
          </div>
        </div>

        <div class="items">
          ${itemHtml || '<div class="empty">品物情報がありません。</div>'}
        </div>

        ${paymentHtml}

        <div style="margin-top:12px">
          <label for="pickupNote">受け渡しメモ</label>
          <textarea
            id="pickupNote"
            placeholder="例：ご本人確認済み、領収書発行"
          ></textarea>
        </div>

        <div class="confirm-box">
          <label class="confirm-label">
            <input id="pickupConfirmed" type="checkbox">
            お客様名・受付番号・品物点数・支払い内容を確認しました。
          </label>
        </div>

        <button
          id="completePickupButton"
          class="button button-success complete-button"
          type="button"
        >
          受け渡しを完了する
        </button>
      `;

      document.getElementById("completePickupButton")
        .addEventListener(
          "click",
          () => completePickup(order)
        );
    }

    function paymentRadio(value, label) {
      return `
        <label class="payment-option">
          <input
            type="radio"
            name="paymentChoice"
            value="${escapeHtml(value)}"
          >
          ${escapeHtml(label)}
        </label>
      `;
    }

    async function completePickup(order) {
      if (!elements.staffSelect.value) {
        showToast(
          "担当スタッフを選択してください。",
          true
        );
        elements.staffSelect.focus();
        return;
      }

      const confirmed =
        document.getElementById("pickupConfirmed");

      if (!confirmed?.checked) {
        showToast(
          "確認チェックを入れてください。",
          true
        );
        return;
      }

      let paymentAction;
      let paymentMethod = null;

      if (order.payment_status === "paid") {
        paymentAction = "already_paid";
      } else {
        const selectedPayment =
          document.querySelector(
            'input[name="paymentChoice"]:checked'
          );

        if (!selectedPayment) {
          showToast(
            "支払い方法または未精算を選択してください。",
            true
          );
          return;
        }

        if (selectedPayment.value === "leave_unpaid") {
          paymentAction = "leave_unpaid";
        } else {
          paymentAction = "paid_now";
          paymentMethod = selectedPayment.value;
        }
      }

      const paymentLabel =
        paymentAction === "already_paid"
          ? "支払い済み"
          : paymentAction === "leave_unpaid"
          ? "未精算"
          : PAYMENT_METHOD_LABELS[paymentMethod];

      const confirmedByUser = window.confirm(
        `${order.customer?.full_name || ""} 様\n` +
        `${order.order_number}\n` +
        `${Number(order.item_count || 0)}点・${formatYen(order.total_amount)}\n` +
        `支払い：${paymentLabel}\n\n` +
        "この内容で受け渡しを完了しますか？"
      );

      if (!confirmedByUser) return;

      state.busy = true;
      setBusy(true);

      try {
        const url = buildAdminUrl(
          `/api/admin/orders/${order.order_id}/pickup-complete`
        );

        const data = await apiFetch(
          url,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              staff_id: elements.staffSelect.value,
              expected_status: order.status,
              payment_action: paymentAction,
              payment_method: paymentMethod,
              note:
                document.getElementById("pickupNote")
                  ?.value.trim() || "",
              changed_by_label:
                "店舗タブレット STEP CLEANING-17-R2"
            })
          }
        );

        renderSuccess(
          data.result?.order || {},
          order.customer || {}
        );

        showToast(
          `${order.order_number}の受け渡しを完了しました。`
        );

        state.selectedOrderId = null;
        await loadBoard({
          force: true
        });
      } catch (error) {
        console.error(error);
        showToast(
          error.data?.message || error.message,
          true
        );

        if (error.status === 409) {
          await loadBoard();
        }
      } finally {
        state.busy = false;
        setBusy(false);
      }
    }

    function renderSuccess(order, customer) {
      elements.detailPlaceholder.hidden = true;
      elements.detailContent.hidden = false;

      elements.detailContent.innerHTML = `
        <div class="success-card">
          <div class="success-icon">✓</div>
          <div class="success-title">
            受け渡しが完了しました
          </div>
          <div class="success-order">
            ${escapeHtml(order.order_number || "")}
          </div>
          <div class="meta">
            ${escapeHtml(customer.full_name || "")} 様
            ／ ${escapeHtml(
              PAYMENT_STATUS_LABELS[
                order.payment_status
              ] || order.payment_status || ""
            )}
          </div>
          <button
            id="nextPickupButton"
            class="button button-secondary"
            type="button"
            style="margin-top:14px"
          >
            次の受け渡しを開始
          </button>
        </div>
      `;

      document.getElementById("nextPickupButton")
        .addEventListener("click", () => {
          clearDetail();
          elements.searchInput.focus();
        });
    }

    function clearDetail() {
      state.selectedOrderId = null;
      elements.detailContent.hidden = true;
      elements.detailContent.innerHTML = "";
      elements.detailPlaceholder.hidden = false;

      if (state.board) {
        renderOrders(state.board.orders || []);
      }
    }

    function setBusy(disabled) {
      elements.openButton.disabled = disabled;
      elements.searchButton.disabled = disabled;
      elements.refreshButton.disabled = disabled;
    }

    function setStatus(message, type = "") {
      elements.connectionStatus.textContent = message;
      elements.connectionStatus.className =
        `status-line ${type}`.trim();
    }

    let toastTimer = null;

    function showToast(message, isError = false) {
      elements.toast.textContent = message;
      elements.toast.className =
        `toast visible${isError ? " error" : ""}`;

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        elements.toast.className = "toast";
      }, 3400);
    }

    elements.clearAdminKeyButton.addEventListener(
      "click",
      () => {
        elements.adminKey.value = "";
        elements.adminKey.focus();
        setStatus(
          "管理コードを消去しました。再入力してください。"
        );
      }
    );

    elements.openButton.addEventListener(
      "click",
      loadBoard
    );

    elements.searchButton.addEventListener(
      "click",
      loadBoard
    );

    elements.refreshButton.addEventListener(
      "click",
      loadBoard
    );

    elements.statusFilter.addEventListener(
      "change",
      loadBoard
    );

    elements.searchInput.addEventListener(
      "keydown",
      (event) => {
        if (event.key === "Enter") {
          loadBoard();
        }
      }
    );

    const initialParams =
      new URL(location.href).searchParams;
    const initialOrderId =
      initialParams.get("order_id") || "";
    const initialQuery =
      initialParams.get("q") || "";

    if (initialQuery) {
      elements.searchInput.value = initialQuery;
    }

    if (initialOrderId) {
      state.selectedOrderId = initialOrderId;
    }

    loadBoard({
      force:true,
      keepSelection:Boolean(initialOrderId)
    });
  </script>
</body>
</html>
