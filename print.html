<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#087f8c">
  <title>DPRO クリーニング LINE｜受付票・控え・品物タグ印刷</title>
  <style>
    :root {
      --bg:#edf5f7;
      --panel:#fff;
      --line:#d3e3e8;
      --ink:#163644;
      --muted:#687f89;
      --primary:#07828e;
      --primary-dark:#05616a;
      --success:#16825d;
      --danger:#bd3b49;
      --warning:#b16d00;
      --shadow:0 12px 32px rgba(23,55,69,.09);
    }

    * { box-sizing:border-box; }
    [hidden] { display:none !important; }

    body {
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:
        -apple-system,BlinkMacSystemFont,"Segoe UI",
        "Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    }

    button,input,select { font:inherit; }
    button { cursor:pointer; }
    button:disabled { opacity:.55; cursor:not-allowed; }

    .header {
      padding:19px 18px;
      color:#fff;
      background:linear-gradient(135deg,#05636d,#07828e 58%,#0ca7a9);
    }

    .header-inner {
      width:min(1500px,100%);
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-mark {
      width:50px;
      height:50px;
      display:grid;
      place-items:center;
      border-radius:15px;
      background:rgba(255,255,255,.17);
      font-size:27px;
    }

    h1 {
      margin:0;
      font-size:clamp(22px,3vw,34px);
    }

    .subtitle {
      margin-top:4px;
      color:rgba(255,255,255,.84);
      font-size:12px;
    }

    .version {
      padding:7px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      font-size:10px;
    }

    .container {
      width:min(1500px,calc(100% - 22px));
      margin:15px auto 44px;
    }

    .panel {
      margin-bottom:14px;
      padding:15px;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    label {
      display:block;
      margin-bottom:6px;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }

    input,select {
      width:100%;
      min-height:46px;
      border:1px solid #c6d8df;
      border-radius:11px;
      padding:9px 12px;
      color:var(--ink);
      background:#fff;
      outline:none;
    }

    input:focus,select:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(7,130,142,.12);
    }

    .connection {
      display:grid;
      grid-template-columns:minmax(170px,.65fr) auto minmax(220px,.85fr) auto;
      gap:9px;
      align-items:end;
    }

    .search-grid {
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:9px;
      align-items:end;
    }

    .button {
      min-height:46px;
      border:0;
      border-radius:11px;
      padding:9px 14px;
      font-weight:900;
    }

    .primary { color:#fff; background:var(--primary); }
    .success { color:#fff; background:var(--success); }
    .secondary { color:var(--primary-dark); background:#e7f5f6; }
    .warning { color:#fff; background:var(--warning); }
    .clear {
      color:var(--danger);
      background:#fff;
      border:1px solid #d5e0e5;
    }

    .message {
      margin-top:9px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:11px;
      color:var(--muted);
      background:#f9fbfc;
      font-size:12px;
      line-height:1.6;
    }

    .message.success {
      color:#126847;
      border-color:#bfe2d3;
      background:#ebf9f3;
    }

    .message.error {
      color:#982e3b;
      border-color:#edc5ca;
      background:#fff0f2;
    }

    .workspace {
      display:grid;
      grid-template-columns:minmax(300px,.72fr) minmax(640px,1.55fr);
      gap:14px;
      align-items:start;
    }

    .orders {
      display:grid;
      gap:8px;
      max-height:690px;
      overflow:auto;
      padding-right:3px;
    }

    .order-card {
      width:100%;
      border:1px solid var(--line);
      border-radius:13px;
      padding:11px;
      color:var(--ink);
      background:#fff;
      text-align:left;
    }

    .order-card.active {
      border:2px solid var(--primary);
      background:#f1fbfb;
      box-shadow:0 8px 18px rgba(7,130,142,.12);
    }

    .order-number {
      font-size:14px;
      font-weight:900;
    }

    .order-name {
      margin-top:3px;
      font-size:16px;
      font-weight:900;
    }

    .order-meta {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
      margin-top:9px;
    }

    .mini {
      padding:7px;
      border:1px solid #dce8ec;
      border-radius:9px;
      background:#f9fbfc;
    }

    .mini-label {
      color:var(--muted);
      font-size:8px;
      font-weight:900;
    }

    .mini-value {
      margin-top:2px;
      font-size:11px;
      font-weight:900;
    }

    .section-title {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .section-title h2 {
      margin:0;
      font-size:19px;
    }

    .print-toolbar {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
      margin-bottom:12px;
    }

    .print-note {
      margin-bottom:12px;
      padding:10px 12px;
      border:1px solid #c5dce1;
      border-radius:11px;
      color:var(--muted);
      background:#f7fbfc;
      font-size:11px;
      line-height:1.6;
    }

    .preview-stack {
      display:grid;
      gap:14px;
    }

    .print-sheet {
      width:100%;
      min-height:1040px;
      padding:28px;
      border:1px solid #cbdce1;
      border-radius:8px;
      color:#111;
      background:#fff;
      box-shadow:0 10px 28px rgba(0,0,0,.08);
    }

    .sheet-header {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      padding-bottom:12px;
      border-bottom:3px solid #111;
    }

    .sheet-title {
      font-size:27px;
      font-weight:900;
      letter-spacing:.04em;
    }

    .sheet-subtitle {
      margin-top:4px;
      font-size:11px;
    }

    .shop-name {
      font-size:17px;
      font-weight:900;
      text-align:right;
    }

    .shop-meta {
      margin-top:4px;
      font-size:10px;
      line-height:1.6;
      text-align:right;
    }

    .order-hero {
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:10px;
      margin-top:14px;
    }

    .hero-box {
      padding:11px;
      border:1.5px solid #333;
      border-radius:6px;
    }

    .hero-label {
      font-size:9px;
      font-weight:900;
    }

    .hero-value {
      margin-top:4px;
      font-size:20px;
      font-weight:900;
    }

    .info-grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-top:10px;
    }

    .info-box {
      min-height:64px;
      padding:8px;
      border:1px solid #777;
      border-radius:5px;
    }

    .info-label {
      font-size:8px;
      font-weight:900;
      color:#444;
    }

    .info-value {
      margin-top:3px;
      font-size:12px;
      font-weight:900;
      word-break:break-word;
    }

    .sheet-section {
      margin-top:14px;
    }

    .sheet-section-title {
      padding:6px 8px;
      color:#fff;
      background:#222;
      font-size:11px;
      font-weight:900;
    }

    .items-table {
      width:100%;
      border-collapse:collapse;
      margin-top:5px;
      font-size:10px;
    }

    .items-table th,
    .items-table td {
      border:1px solid #555;
      padding:6px;
      vertical-align:top;
    }

    .items-table th {
      background:#eee;
      font-weight:900;
    }

    .money-area {
      display:grid;
      grid-template-columns:1fr 300px;
      gap:10px;
      margin-top:12px;
    }

    .notice-box {
      min-height:128px;
      padding:10px;
      border:1px solid #777;
      white-space:pre-wrap;
      font-size:10px;
      line-height:1.7;
    }

    .money-table {
      width:100%;
      border-collapse:collapse;
      font-size:11px;
    }

    .money-table th,
    .money-table td {
      border:1px solid #555;
      padding:7px;
    }

    .money-table th {
      width:55%;
      background:#eee;
      text-align:left;
    }

    .money-table td {
      text-align:right;
      font-weight:900;
    }

    .money-total th,
    .money-total td {
      font-size:16px;
      border-top:3px solid #111;
    }

    .signature-area {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:15px;
    }

    .signature-box {
      height:74px;
      padding:8px;
      border:1px solid #777;
      font-size:9px;
    }

    .sheet-footer {
      margin-top:12px;
      padding-top:8px;
      border-top:1px solid #777;
      font-size:9px;
      line-height:1.6;
    }

    .internal-alert {
      margin-top:10px;
      padding:9px;
      border:2px solid #b00020;
      color:#8c0019;
      font-size:10px;
      font-weight:900;
      white-space:pre-wrap;
    }

    .tags-sheet {
      min-height:auto;
    }

    .tags-header {
      margin-bottom:12px;
      padding-bottom:8px;
      border-bottom:3px solid #111;
    }

    .tags-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .item-tag {
      min-height:225px;
      padding:10px;
      border:2px dashed #333;
      break-inside:avoid;
      page-break-inside:avoid;
    }

    .tag-order {
      font-size:15px;
      font-weight:900;
    }

    .tag-customer {
      margin-top:4px;
      font-size:16px;
      font-weight:900;
    }

    .tag-item {
      margin-top:9px;
      padding:7px;
      border:2px solid #111;
      font-size:15px;
      font-weight:900;
      text-align:center;
    }

    .tag-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:5px;
      margin-top:7px;
    }

    .tag-box {
      min-height:44px;
      padding:5px;
      border:1px solid #555;
    }

    .tag-label {
      font-size:7px;
      font-weight:900;
    }

    .tag-value {
      margin-top:2px;
      font-size:10px;
      font-weight:900;
    }

    .tag-note {
      margin-top:7px;
      min-height:38px;
      padding:5px;
      border:1px solid #555;
      font-size:8px;
      line-height:1.45;
    }

    .empty {
      padding:35px 14px;
      border:1px dashed #c7d8de;
      border-radius:14px;
      color:var(--muted);
      background:#fbfdfe;
      text-align:center;
      font-size:12px;
    }

    .small {
      color:var(--muted);
      font-size:10px;
      line-height:1.6;
    }

    .toast {
      position:fixed;
      z-index:1000;
      left:50%;
      bottom:24px;
      width:min(600px,calc(100% - 28px));
      transform:translate(-50%,30px);
      opacity:0;
      pointer-events:none;
      border-radius:13px;
      padding:14px 16px;
      color:#fff;
      background:#173543;
      box-shadow:0 12px 34px rgba(0,0,0,.2);
      transition:.22s ease;
      font-size:13px;
      font-weight:900;
      text-align:center;
    }

    .toast.visible {
      transform:translate(-50%,0);
      opacity:1;
    }

    .toast.error { background:#a93240; }

    @media (max-width:1050px) {
      .workspace { grid-template-columns:1fr; }
      .orders { max-height:none; }
      .print-toolbar { grid-template-columns:repeat(2,1fr); }
    }

    @media (max-width:700px) {
      .version { display:none; }

      .connection,
      .search-grid,
      .print-toolbar {
        grid-template-columns:1fr;
      }

      .print-sheet {
        min-height:auto;
        padding:15px;
      }

      .info-grid,
      .tags-grid {
        grid-template-columns:1fr 1fr;
      }

      .money-area,
      .signature-area,
      .order-hero {
        grid-template-columns:1fr;
      }
    }

    @page {
      size:A4 portrait;
      margin:8mm;
    }

    @media print {
      body {
        background:#fff !important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }

      .no-print,
      .header,
      .toast {
        display:none !important;
      }

      .container {
        width:100%;
        margin:0;
      }

      .workspace,
      .preview-stack {
        display:block;
      }

      .preview-column {
        width:100%;
      }

      .print-sheet {
        width:100%;
        min-height:auto;
        margin:0;
        padding:0;
        border:0;
        border-radius:0;
        box-shadow:none;
      }

      .customer-copy,
      .store-copy {
        page-break-after:always;
      }

      .tags-sheet {
        page-break-before:auto;
      }

      body.print-customer .print-sheet:not(.customer-copy),
      body.print-store .print-sheet:not(.store-copy),
      body.print-tags .print-sheet:not(.tags-sheet) {
        display:none !important;
      }

      body.print-customer .customer-copy,
      body.print-store .store-copy,
      body.print-tags .tags-sheet,
      body.print-all .print-sheet {
        display:block !important;
      }

      body.print-customer .customer-copy,
      body.print-store .store-copy,
      body.print-tags .tags-sheet {
        page-break-after:auto;
      }
    }
  
    /* STEP CLEANING-18 共通内部ナビ */
    .final-nav-shell {
      position: sticky;
      top: 0;
      z-index: 900;
      border-bottom: 1px solid #d5e4e9;
      background: rgba(255,255,255,.96);
      box-shadow: 0 7px 20px rgba(21,55,70,.08);
      backdrop-filter: blur(10px);
    }
    .final-nav {
      width: min(1500px, calc(100% - 22px));
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 9px 0;
    }
    .final-nav a {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d4e4e8;
      border-radius: 999px;
      padding: 6px 10px;
      color: #315865;
      background: #f7fbfc;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.2;
      text-decoration: none;
      white-space: nowrap;
    }
    .final-nav a:hover {
      border-color: #7fc1c7;
      background: #eef9fa;
    }
    .final-nav a.active {
      border-color: #07828e;
      color: #fff;
      background: #07828e;
      box-shadow: 0 5px 12px rgba(7,130,142,.18);
    }
    .final-nav a.nav-home {
      border-color: #b8dfe2;
      color: #05616a;
      background: #e8f6f7;
    }
    @media (max-width: 760px) {
      .final-nav {
        width: 100%;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: 8px 11px;
        scrollbar-width: thin;
      }
    }
    @media print {
      .final-nav-shell { display: none !important; }
    }

  </style>
</head>
<body>
  <header class="header no-print">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">🖨️</div>
        <div>
          <h1>DPRO クリーニング LINE</h1>
          <div class="subtitle">受付票・お客様控え・品物タグ印刷</div>
        </div>
      </div>
      <div class="version">STEP CLEANING-18</div>
    </div>
  </header>

  <nav class="final-nav-shell no-print" aria-label="DPROクリーニング内部画面">
    <div class="final-nav">
      <a href="demo-guide.html?v=cleaning-18" class="nav-home">デモガイド</a>
      <a href="reception.html?v=cleaning-18">店頭受付</a>

      <a href="owner-ipad.html?v=cleaning-18">受け渡し</a>

      <a href="owner-settings.html?v=cleaning-18">店舗設定</a>
      <a href="owner.html?v=cleaning-18">オーナー</a>
      <a href="member.html?token=demo-cleaning-member-003&v=cleaning-18">会員証デモ</a>
      <a href="system-check.html?v=cleaning-18">システム確認</a>
    </div>
  </nav>


  <main class="container">
    <section class="panel no-print">
      <div class="connection">
        <div>
          <label for="adminKey">管理コード</label>
          <input id="adminKey" type="password" value="1234" autocomplete="off">
        </div>

        <button id="clearButton" class="button clear" type="button">
          消去
        </button>

        <div>
          <label for="shopCode">店舗コード</label>
          <input id="shopCode" value="cleaning_demo" autocomplete="off">
        </div>

        <button id="openButton" class="button primary" type="button">
          印刷画面を開く
        </button>
      </div>

      <div id="message" class="message">
        印刷する注文を選択してください。
      </div>
    </section>

    <section class="panel no-print">
      <div class="search-grid">
        <div>
          <label for="searchInput">受付番号・氏名・会員番号・電話番号</label>
          <input id="searchInput" placeholder="例：CL-20260712-D002">
        </div>

        <button id="searchButton" class="button primary" type="button">
          注文を検索
        </button>

        <button id="refreshButton" class="button secondary" type="button">
          最新情報へ更新
        </button>
      </div>
    </section>

    <div class="workspace">
      <aside class="panel no-print">
        <div class="section-title">
          <h2>注文一覧</h2>
          <div id="orderCount" class="small">0件</div>
        </div>
        <div id="orders" class="orders"></div>
      </aside>

      <section class="preview-column">
        <div class="panel no-print">
          <div class="section-title">
            <h2>印刷する帳票</h2>
            <div id="selectedOrderLabel" class="small">注文未選択</div>
          </div>

          <div class="print-toolbar">
            <button id="printAllButton" class="button success" type="button" disabled>
              すべて一括印刷
            </button>
            <button id="printCustomerButton" class="button primary" type="button" disabled>
              お客様控え
            </button>
            <button id="printStoreButton" class="button secondary" type="button" disabled>
              店舗控え
            </button>
            <button id="printTagsButton" class="button warning" type="button" disabled>
              品物タグ
            </button>
          </div>

          <div class="print-note">
            A4普通紙で印刷できます。「すべて一括印刷」は、お客様控え・店舗控え・品物タグを順番に印刷します。
            品物タグは数量分を自動生成します。
          </div>
        </div>

        <div id="previewStack" class="preview-stack">
          <div class="panel empty no-print">
            左の注文一覧から印刷する注文を選択してください。
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    "use strict";

    const API_BASE =
      "https://dpro-cleaning-line-api.dpromstk2000.workers.dev";

    const STATUS_LABELS = {
      accepted:"受付済み",
      inspecting:"検品中",
      cleaning:"クリーニング中",
      finishing:"仕上げ中",
      ready:"仕上がり済み",
      stored:"保管中",
      delivered:"受け渡し済み",
      rewash:"再洗い・確認中",
      cancelled:"キャンセル"
    };

    const PAYMENT_LABELS = {
      paid:"支払い済み",
      pay_on_pickup:"受取時にお支払い",
      unpaid:"未払い",
      refunded:"返金済み"
    };

    const PAYMENT_METHOD_LABELS = {
      cash:"現金",
      card:"カード",
      qr:"QR・コード決済",
      bank_transfer:"銀行振込",
      other:"その他"
    };

    const CONDITION_LABELS = {
      stain:"シミあり",
      damage:"破れ・傷あり",
      tear:"破れあり",
      button_missing:"ボタン欠損",
      urgent:"急ぎ品",
      color_fade:"色落ち注意",
      shrinkage:"縮み注意"
    };

    const elements = {
      adminKey:document.getElementById("adminKey"),
      clearButton:document.getElementById("clearButton"),
      shopCode:document.getElementById("shopCode"),
      openButton:document.getElementById("openButton"),
      message:document.getElementById("message"),
      searchInput:document.getElementById("searchInput"),
      searchButton:document.getElementById("searchButton"),
      refreshButton:document.getElementById("refreshButton"),
      orderCount:document.getElementById("orderCount"),
      orders:document.getElementById("orders"),
      selectedOrderLabel:document.getElementById("selectedOrderLabel"),
      printAllButton:document.getElementById("printAllButton"),
      printCustomerButton:document.getElementById("printCustomerButton"),
      printStoreButton:document.getElementById("printStoreButton"),
      printTagsButton:document.getElementById("printTagsButton"),
      previewStack:document.getElementById("previewStack"),
      toast:document.getElementById("toast")
    };

    const state = {
      orders:[],
      selectedSummary:null,
      selectedDetail:null,
      busy:false
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function formatYen(value) {
      return `${Number(value || 0).toLocaleString("ja-JP")}円`;
    }

    function formatDateJa(value) {
      const match = String(value || "").match(
        /^(\d{4})-(\d{2})-(\d{2})/
      );

      if (!match) return "-";

      return `${Number(match[1])}年${Number(match[2])}月${Number(match[3])}日`;
    }

    function formatDateTimeJa(value) {
      if (!value) return "-";

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return date.toLocaleString("ja-JP", {
        year:"numeric",
        month:"numeric",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit"
      });
    }

    function buildAdminUrl(path, params = {}) {
      const url = new URL(`${API_BASE}${path}`);

      url.searchParams.set(
        "admin_key",
        elements.adminKey.value.trim()
      );
      url.searchParams.set(
        "shop_code",
        elements.shopCode.value.trim() || "cleaning_demo"
      );

      for (const [key,value] of Object.entries(params)) {
        if (
          value !== undefined &&
          value !== null &&
          value !== ""
        ) {
          url.searchParams.set(key,value);
        }
      }

      return url;
    }

    async function apiFetch(url, options = {}) {
      const response = await fetch(url, options);
      const contentType =
        response.headers.get("content-type") || "";

      if (!contentType.includes("application/json")) {
        throw new Error(
          `APIからJSON以外の応答が返りました（HTTP ${response.status}）`
        );
      }

      const data = await response.json();

      if (!response.ok || data.ok === false) {
        const error = new Error(
          data.message || "API処理に失敗しました。"
        );
        error.data = data;
        error.status = response.status;
        throw error;
      }

      return data;
    }

    async function loadOrders(options = {}) {
      if (state.busy && !options.force) return;

      if (!elements.adminKey.value.trim()) {
        setMessage("管理コードを入力してください。","error");
        return;
      }

      state.busy = true;
      setBusy(true);
      setMessage("注文を読み込んでいます。");

      try {
        const data = await apiFetch(
          buildAdminUrl("/api/admin/orders", {
            q:elements.searchInput.value.trim(),
            limit:100
          })
        );

        state.orders = data.orders || [];
        renderOrders();

        setMessage(
          `${state.orders.length}件の注文を表示しました。`,
          "success"
        );

        const requestedId =
          new URL(location.href).searchParams.get("order_id");

        if (requestedId && options.openRequested !== false) {
          const summary = state.orders.find(
            (order) =>
              (order.order_id || order.id) === requestedId
          );

          if (summary) {
            await selectOrder(summary);
          } else {
            await loadDirectOrder(requestedId);
          }
        } else if (
          state.orders.length === 1 &&
          !state.selectedDetail
        ) {
          await selectOrder(state.orders[0]);
        }
      } catch (error) {
        console.error(error);
        setMessage(
          error.data?.message || error.message,
          "error"
        );
      } finally {
        state.busy = false;
        setBusy(false);
      }
    }

    function renderOrders() {
      elements.orders.innerHTML = "";
      elements.orderCount.textContent =
        `${state.orders.length}件`;

      if (!state.orders.length) {
        elements.orders.innerHTML =
          '<div class="empty">該当する注文はありません。</div>';
        return;
      }

      for (const order of state.orders) {
        const orderId = order.order_id || order.id;

        const button = document.createElement("button");
        button.type = "button";
        button.className =
          `order-card${
            (state.selectedSummary?.order_id ||
             state.selectedSummary?.id) === orderId
              ? " active"
              : ""
          }`;

        button.innerHTML = `
          <div class="order-number">
            ${escapeHtml(order.order_number)}
          </div>
          <div class="order-name">
            ${escapeHtml(order.full_name)}
          </div>
          <div class="small">
            ${escapeHtml(order.customer_number || "")}
            ／ ${escapeHtml(STATUS_LABELS[order.status] || order.status)}
          </div>
          <div class="order-meta">
            <div class="mini">
              <div class="mini-label">品物</div>
              <div class="mini-value">
                ${Number(order.item_count || 0)}点
              </div>
            </div>
            <div class="mini">
              <div class="mini-label">合計</div>
              <div class="mini-value">
                ${escapeHtml(formatYen(order.total_amount))}
              </div>
            </div>
            <div class="mini">
              <div class="mini-label">予定日</div>
              <div class="mini-value">
                ${escapeHtml(formatDateJa(order.promised_date))}
              </div>
            </div>
          </div>
        `;

        button.addEventListener("click",() => {
          selectOrder(order);
        });

        elements.orders.appendChild(button);
      }
    }

    async function loadDirectOrder(orderId) {
      try {
        const data = await apiFetch(
          buildAdminUrl(`/api/admin/orders/${orderId}`)
        );

        state.selectedSummary = {
          order_id:data.order?.id,
          order_number:data.order?.order_number,
          full_name:data.customer?.full_name,
          customer_number:data.customer?.customer_number,
          status:data.order?.status,
          item_count:data.order?.item_count,
          total_amount:data.order?.total_amount,
          promised_date:data.order?.promised_date
        };
        state.selectedDetail = data;

        renderOrders();
        renderPrintPreview();
      } catch (error) {
        console.error(error);
        setMessage(
          error.data?.message || error.message,
          "error"
        );
      }
    }

    async function selectOrder(summary) {
      if (state.busy) return;

      state.selectedSummary = summary;
      renderOrders();

      state.busy = true;
      setBusy(true);
      setMessage("印刷データを読み込んでいます。");

      try {
        const orderId = summary.order_id || summary.id;
        state.selectedDetail = await apiFetch(
          buildAdminUrl(`/api/admin/orders/${orderId}`)
        );

        renderPrintPreview();
        setMessage(
          `${state.selectedDetail.order?.order_number || ""} の印刷準備が完了しました。`,
          "success"
        );
      } catch (error) {
        console.error(error);
        state.selectedDetail = null;
        setMessage(
          error.data?.message || error.message,
          "error"
        );
      } finally {
        state.busy = false;
        setBusy(false);
      }
    }

    function getConditionText(item) {
      const values = [];

      for (const [key,value] of Object.entries(
        item.condition_flags || {}
      )) {
        if (value === true) {
          values.push(
            CONDITION_LABELS[key] || key
          );
        }
      }

      return values.length
        ? values.join("・")
        : "特記事項なし";
    }

    function getOptionsText(item) {
      const options =
        item.cleaning_item_options || [];

      if (!options.length) return "なし";

      return options
        .map((option) =>
          `${option.option_name} × ${Number(option.quantity || 1)}`
        )
        .join("、");
    }

    function itemRows(items, internal = false) {
      return items.map((item) => {
        const notes = [
          item.customer_visible_note
            ? `お客様向け：${item.customer_visible_note}`
            : "",
          internal && item.internal_note
            ? `店舗メモ：${item.internal_note}`
            : ""
        ].filter(Boolean).join("<br>");

        return `
          <tr>
            <td>${escapeHtml(item.item_code)}</td>
            <td>
              <strong>${escapeHtml(item.item_name)}</strong><br>
              <span>${escapeHtml(getOptionsText(item))}</span>
              ${notes ? `<br><span>${notes}</span>` : ""}
            </td>
            <td>${Number(item.quantity || 0)}</td>
            <td>${escapeHtml(getConditionText(item))}</td>
            <td>${escapeHtml(formatYen(item.line_amount))}</td>
          </tr>
        `;
      }).join("");
    }

    function moneyTable(order) {
      return `
        <table class="money-table">
          <tr>
            <th>品物小計</th>
            <td>${escapeHtml(formatYen(order.subtotal_amount))}</td>
          </tr>
          <tr>
            <th>加工料金</th>
            <td>${escapeHtml(formatYen(order.option_amount))}</td>
          </tr>
          <tr>
            <th>割引</th>
            <td>− ${escapeHtml(formatYen(order.discount_amount))}</td>
          </tr>
          <tr>
            <th>税額</th>
            <td>${escapeHtml(formatYen(order.tax_amount))}</td>
          </tr>
          <tr class="money-total">
            <th>合計</th>
            <td>${escapeHtml(formatYen(order.total_amount))}</td>
          </tr>
        </table>
      `;
    }

    function baseSheetHeader(title, shop, order) {
      return `
        <div class="sheet-header">
          <div>
            <div class="sheet-title">${escapeHtml(title)}</div>
            <div class="sheet-subtitle">
              受付番号：${escapeHtml(order.order_number)}
            </div>
          </div>
          <div>
            <div class="shop-name">
              ${escapeHtml(shop.shop_name || shop.shop_name_short || "DPROクリーニング")}
            </div>
            <div class="shop-meta">
              ${escapeHtml(shop.address || "")}<br>
              TEL：${escapeHtml(shop.phone || "-")}
            </div>
          </div>
        </div>
      `;
    }

    function sharedOrderInfo(order,customer) {
      return `
        <div class="order-hero">
          <div class="hero-box">
            <div class="hero-label">お客様</div>
            <div class="hero-value">
              ${escapeHtml(customer.full_name || "-")} 様
            </div>
            <div class="small">
              会員番号：${escapeHtml(customer.customer_number || "-")}
              ／ 電話：${escapeHtml(customer.phone_raw || customer.phone_normalized || "-")}
            </div>
          </div>

          <div class="hero-box">
            <div class="hero-label">受付番号</div>
            <div class="hero-value">
              ${escapeHtml(order.order_number || "-")}
            </div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-label">受付日時</div>
            <div class="info-value">
              ${escapeHtml(formatDateTimeJa(order.received_at))}
            </div>
          </div>
          <div class="info-box">
            <div class="info-label">仕上がり予定日</div>
            <div class="info-value">
              ${escapeHtml(formatDateJa(order.promised_date))}
            </div>
          </div>
          <div class="info-box">
            <div class="info-label">工程状態</div>
            <div class="info-value">
              ${escapeHtml(STATUS_LABELS[order.status] || order.status || "-")}
            </div>
          </div>
          <div class="info-box">
            <div class="info-label">お支払い</div>
            <div class="info-value">
              ${escapeHtml(PAYMENT_LABELS[order.payment_status] || order.payment_status || "-")}
              ${
                order.payment_method
                  ? `<br>${escapeHtml(PAYMENT_METHOD_LABELS[order.payment_method] || order.payment_method)}`
                  : ""
              }
            </div>
          </div>
        </div>
      `;
    }

    function renderCustomerCopy(data) {
      const order = data.order || {};
      const customer = data.customer || {};
      const shop = data.shop || {};
      const items = data.items || [];

      const customerNote = [
        order.customer_note || "",
        shop.receipt_note || ""
      ].filter(Boolean).join("\n\n");

      return `
        <section class="print-sheet customer-copy">
          ${baseSheetHeader("お客様控え",shop,order)}
          ${sharedOrderInfo(order,customer)}

          <div class="sheet-section">
            <div class="sheet-section-title">お預かり品</div>
            <table class="items-table">
              <thead>
                <tr>
                  <th>品番</th>
                  <th>品物・加工</th>
                  <th>数量</th>
                  <th>受付時の状態</th>
                  <th>品物料金</th>
                </tr>
              </thead>
              <tbody>
                ${itemRows(items,false)}
              </tbody>
            </table>
          </div>

          <div class="money-area">
            <div>
              <div class="sheet-section-title">ご案内・注意事項</div>
              <div class="notice-box">${escapeHtml(customerNote || "特記事項はありません。")}</div>
            </div>
            <div>
              ${moneyTable(order)}
            </div>
          </div>

          <div class="signature-area">
            <div class="signature-box">
              お客様確認欄
            </div>
            <div class="signature-box">
              店舗受付欄
            </div>
          </div>

          <div class="sheet-footer">
            受取時に受付番号またはLINE会員証をご提示ください。
            仕上がり予定日は、品物の状態や加工内容により変更となる場合があります。
          </div>
        </section>
      `;
    }

    function renderStoreCopy(data) {
      const order = data.order || {};
      const customer = data.customer || {};
      const shop = data.shop || {};
      const items = data.items || [];

      const internalText = [
        order.internal_note
          ? `注文メモ：${order.internal_note}`
          : "",
        order.receipt_note
          ? `受付メモ：${order.receipt_note}`
          : "",
        order.customer_note
          ? `お客様要望：${order.customer_note}`
          : ""
      ].filter(Boolean).join("\n");

      return `
        <section class="print-sheet store-copy">
          ${baseSheetHeader("店舗控え・受付票",shop,order)}
          ${sharedOrderInfo(order,customer)}

          <div class="sheet-section">
            <div class="sheet-section-title">品物明細・店舗確認</div>
            <table class="items-table">
              <thead>
                <tr>
                  <th>品番</th>
                  <th>品物・加工・メモ</th>
                  <th>数量</th>
                  <th>状態確認</th>
                  <th>品物料金</th>
                </tr>
              </thead>
              <tbody>
                ${itemRows(items,true)}
              </tbody>
            </table>
          </div>

          ${
            internalText
              ? `<div class="internal-alert">${escapeHtml(internalText)}</div>`
              : ""
          }

          <div class="money-area">
            <div>
              <div class="sheet-section-title">工程・受け渡し記録</div>
              <div class="notice-box">検品担当：____________________
洗浄担当：____________________
仕上げ担当：__________________
最終確認：____________________
受け渡し担当：________________
受け渡し日時：________________</div>
            </div>
            <div>
              ${moneyTable(order)}
            </div>
          </div>

          <div class="signature-area">
            <div class="signature-box">
              検品・仕上がり確認
            </div>
            <div class="signature-box">
              受け渡し・支払い確認
            </div>
          </div>

          <div class="sheet-footer">
            管理用書類です。お客様には渡さないでください。
          </div>
        </section>
      `;
    }

    function renderTags(data) {
      const order = data.order || {};
      const customer = data.customer || {};
      const shop = data.shop || {};
      const items = data.items || [];
      const tags = [];

      for (const item of items) {
        const quantity = Math.max(
          1,
          Number(item.quantity || 1)
        );

        for (let index = 1; index <= quantity; index += 1) {
          tags.push(`
            <article class="item-tag">
              <div class="tag-order">
                ${escapeHtml(order.order_number || "-")}
              </div>
              <div class="tag-customer">
                ${escapeHtml(customer.full_name || "-")} 様
              </div>

              <div class="tag-item">
                ${escapeHtml(item.item_code)}-${index}
                ／ ${escapeHtml(item.item_name)}
              </div>

              <div class="tag-grid">
                <div class="tag-box">
                  <div class="tag-label">仕上がり予定</div>
                  <div class="tag-value">
                    ${escapeHtml(formatDateJa(item.promised_date || order.promised_date))}
                  </div>
                </div>
                <div class="tag-box">
                  <div class="tag-label">工程状態</div>
                  <div class="tag-value">
                    ${escapeHtml(STATUS_LABELS[item.status] || STATUS_LABELS[order.status] || "-")}
                  </div>
                </div>
                <div class="tag-box">
                  <div class="tag-label">加工</div>
                  <div class="tag-value">
                    ${escapeHtml(getOptionsText(item))}
                  </div>
                </div>
                <div class="tag-box">
                  <div class="tag-label">状態</div>
                  <div class="tag-value">
                    ${escapeHtml(getConditionText(item))}
                  </div>
                </div>
              </div>

              <div class="tag-note">
                ${
                  escapeHtml(
                    item.internal_note ||
                    item.customer_visible_note ||
                    "店舗確認メモ："
                  )
                }
              </div>

              <div class="small" style="margin-top:6px">
                ${escapeHtml(shop.shop_name_short || shop.shop_name || "DPROクリーニング")}
              </div>
            </article>
          `);
        }
      }

      return `
        <section class="print-sheet tags-sheet">
          <div class="tags-header">
            <div class="sheet-title">品物管理タグ</div>
            <div class="sheet-subtitle">
              ${escapeHtml(order.order_number || "-")}
              ／ ${escapeHtml(customer.full_name || "-")} 様
              ／ 合計${tags.length}枚
            </div>
          </div>
          <div class="tags-grid">
            ${tags.join("")}
          </div>
        </section>
      `;
    }

    function renderPrintPreview() {
      const data = state.selectedDetail;

      if (!data?.order) {
        elements.previewStack.innerHTML =
          '<div class="panel empty no-print">注文を選択してください。</div>';
        setPrintButtons(false);
        return;
      }

      elements.selectedOrderLabel.textContent =
        `${data.order.order_number}／${data.customer?.full_name || ""}`;

      elements.previewStack.innerHTML =
        renderCustomerCopy(data) +
        renderStoreCopy(data) +
        renderTags(data);

      setPrintButtons(true);
    }

    function setPrintButtons(enabled) {
      elements.printAllButton.disabled = !enabled;
      elements.printCustomerButton.disabled = !enabled;
      elements.printStoreButton.disabled = !enabled;
      elements.printTagsButton.disabled = !enabled;
    }

    function printMode(mode) {
      if (!state.selectedDetail?.order) {
        showToast("印刷する注文を選択してください。",true);
        return;
      }

      document.body.classList.remove(
        "print-all",
        "print-customer",
        "print-store",
        "print-tags"
      );
      document.body.classList.add(`print-${mode}`);

      setTimeout(() => {
        window.print();
      },100);
    }

    function setBusy(disabled) {
      state.busy = disabled;
      elements.openButton.disabled = disabled;
      elements.searchButton.disabled = disabled;
      elements.refreshButton.disabled = disabled;
    }

    function setMessage(message,type = "") {
      elements.message.textContent = message;
      elements.message.className =
        `message ${type}`.trim();
    }

    let toastTimer = null;

    function showToast(message,isError = false) {
      elements.toast.textContent = message;
      elements.toast.className =
        `toast visible${isError ? " error" : ""}`;

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        elements.toast.className = "toast";
      },3200);
    }

    elements.clearButton.addEventListener("click",() => {
      elements.adminKey.value = "";
      elements.adminKey.focus();
      setMessage(
        "管理コードを消去しました。再入力してください。"
      );
    });

    elements.openButton.addEventListener(
      "click",
      () => loadOrders({
        force:true,
        openRequested:true
      })
    );

    elements.searchButton.addEventListener(
      "click",
      () => loadOrders({
        force:true,
        openRequested:false
      })
    );

    elements.refreshButton.addEventListener(
      "click",
      () => loadOrders({
        force:true,
        openRequested:true
      })
    );

    elements.searchInput.addEventListener(
      "keydown",
      (event) => {
        if (event.key === "Enter") {
          loadOrders({
            force:true,
            openRequested:false
          });
        }
      }
    );

    elements.printAllButton.addEventListener(
      "click",
      () => printMode("all")
    );
    elements.printCustomerButton.addEventListener(
      "click",
      () => printMode("customer")
    );
    elements.printStoreButton.addEventListener(
      "click",
      () => printMode("store")
    );
    elements.printTagsButton.addEventListener(
      "click",
      () => printMode("tags")
    );

    window.addEventListener("afterprint",() => {
      document.body.classList.remove(
        "print-all",
        "print-customer",
        "print-store",
        "print-tags"
      );
    });

    loadOrders({
      force:true,
      openRequested:true
    });
  </script>
</body>
</html>
